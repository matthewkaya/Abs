name: Question
description: Ask a question about ABS.
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking here, please check:
        - [Setup guide](../docs/setup-guide.md)
        - [FAQ](../docs/faq.md)
        - [Troubleshooting](../docs/troubleshooting.md)
        - [Discussions](https://github.com/automatiabcn/abs/discussions)
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? Which version are you on?
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
