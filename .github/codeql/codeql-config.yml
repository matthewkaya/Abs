name: "ABS CodeQL custom config"

# Sprint 2E ITEM-B — `_safe_path._safe_open()` performs three sanitization
# steps that CodeQL's default `py/path-injection` taint model does not
# recognise as a sanitizer:
#
#   1. `Path(p).resolve()` canonicalisation
#   2. `ALLOWED_ROOTS` prefix check
#   3. `is_symlink()` reject
#
# CodeQL therefore flagged 9 false-positive path-injection findings on the
# Sprint-2D-introduced helper itself plus its three call sites. This config
# excludes path-injection on those specific scanner-helper files. A future
# legitimate bug in those five files would not be flagged — revisit when
# CodeQL ships richer sanitizer-model APIs.

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - "**/__pycache__/**"
  - "**/node_modules/**"
  - "core/landing/.next/**"
  - "core/backend/.venv/**"

query-filters:
  - exclude:
      id: py/path-injection
      paths:
        - "core/backend/app/symbols/_safe_path.py"
        - "core/backend/app/symbols/parser.py"
        - "core/backend/app/symbols/index.py"
        - "core/backend/app/symbols/typescript_parser.py"
        - "infra/piper/server.py"
