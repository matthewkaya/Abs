# Q12 R41 — Weekend mutation testing for high-value backend modules.
#
# Background: full mutmut on a single critical module can run 16-24
# minutes (Q12 S5 R31 measured this on `app/auth/oauth/server.py`).
# That kills CI throughput on every PR. The pivot is to run mutmut
# only on the weekend off-hours window, against modules where a
# surviving mutant maps directly to a security or correctness bug
# class.
#
# Output is a per-module report uploaded as a workflow artifact.
# A surviving mutant does not fail the build; it surfaces in the
# weekly review as a candidate for a focused boundary test
# (S5 R31 mutation-floor pattern).
#
# Security: matrix values come from this workflow file (not from
# untrusted github.event inputs) but we still route them through
# env: blocks for defensive consistency. workflow_dispatch.modules
# input is documentation only — the matrix is the source of truth.
name: Mutation Weekend

on:
  schedule:
    - cron: "0 2 * * SAT"  # Sat 02:00 UTC, off-hours weekend window
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-weekend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        module:
          - app/cascade
          - app/auth/oauth
          - app/api/auth
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install backend + mutmut
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mutmut==2.5.0
      - name: Run mutmut
        env:
          MUTMUT_PATH: ${{ matrix.module }}
        run: |
          mutmut run --paths-to-mutate="$MUTMUT_PATH" --no-progress || true
          mutmut results > /tmp/mutmut-report.txt || true
          echo "=== Top survivors ==="
          mutmut results | head -80 || true
      - name: Upload mutmut report
        if: always()
        env:
          ARTIFACT_NAME: mutmut-${{ matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            /tmp/mutmut-report.txt
            core/backend/.mutmut-cache
          if-no-files-found: warn
          retention-days: 30
      - name: Surface survivor count to summary
        if: always()
        env:
          MODULE: ${{ matrix.module }}
        run: |
          if [ -f /tmp/mutmut-report.txt ]; then
            {
              echo "## Mutmut survivors — $MODULE"
              echo '```'
              head -40 /tmp/mutmut-report.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
