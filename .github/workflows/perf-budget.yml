# T-R05 — perf budget gate (Lighthouse CI + bundlewatch + web-vitals).
# Security: every interpolation routes through `env:` blocks. Sources used:
# secrets.BUNDLEWATCH_GITHUB_TOKEN, github.repository_owner, github.sha,
# github.ref_name, github.event.repository.name. None are untrusted PR/issue
# text expanded into a run: block.
#
# These three jobs are REQUIRED status checks on `main`. Previously the
# workflow was path-filtered to `core/landing/**`, so a backend/docs-only PR
# never triggered it and the required checks stayed "pending" forever →
# branch protection blocked the merge. Fix: the workflow now runs on EVERY
# PR; a `changes` job detects whether the landing app actually changed, and
# the heavy steps are gated on it. When landing is untouched the jobs run but
# do nothing and conclude success — so the required check reports green
# without wasting Lighthouse/Playwright minutes.
name: Perf Budget

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'core/landing/**'
      - '.github/workflows/perf-budget.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perf-budget-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            landing:
              - 'core/landing/**'
              - '.github/workflows/perf-budget.yml'

  lighthouse:
    needs: changes
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/landing
    steps:
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - if: needs.changes.outputs.landing == 'true'
        run: npm ci
      - if: needs.changes.outputs.landing == 'true'
        run: npm run build
      - if: needs.changes.outputs.landing == 'true'
        name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: core/landing/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - if: needs.changes.outputs.landing != 'true'
        working-directory: ${{ github.workspace }}
        run: echo "No landing changes — Lighthouse skipped (reporting success)."

  bundlewatch:
    needs: changes
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/landing
    steps:
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - if: needs.changes.outputs.landing == 'true'
        run: npm ci
      - if: needs.changes.outputs.landing == 'true'
        run: ANALYZE=false npm run build
      - if: needs.changes.outputs.landing == 'true'
        name: Bundlewatch
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}
          CI_REPO_OWNER: ${{ github.repository_owner }}
          CI_REPO_NAME: ${{ github.event.repository.name }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_BRANCH: ${{ github.ref_name }}
        run: npx bundlewatch --config bundlewatch.config.json
      - if: needs.changes.outputs.landing != 'true'
        working-directory: ${{ github.workspace }}
        run: echo "No landing changes — bundlewatch skipped (reporting success)."

  web-vitals:
    needs: changes
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/landing
    steps:
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.landing == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - if: needs.changes.outputs.landing == 'true'
        run: npm ci
      - if: needs.changes.outputs.landing == 'true'
        run: npx playwright install chromium --with-deps
      - if: needs.changes.outputs.landing == 'true'
        run: npx playwright test __tests__/playwright/web-vitals.spec.ts --project=chromium-desktop
      - if: needs.changes.outputs.landing != 'true'
        working-directory: ${{ github.workspace }}
        run: echo "No landing changes — web-vitals skipped (reporting success)."
