# Release — Sprint 2G ITEM 11
#
# Trigger: push of a semver tag (v1.0.0, v1.0.0-rcN). Creates the GitHub
# Release entry which then triggers sbom.yml (release: published) to
# attach the CycloneDX SBOMs as release assets.
#
# Sprint 2N.2 FAZ B: image namespace aligned to ghcr.io/automatiabcn/abs-*
# so workflow GITHUB_TOKEN (which is scoped to automatiabcn/abs) can push.
# The pre-2N.2 enzoemir1 namespace required a founder-supplied PAT and
# v1.0.2 push failed with `permission_denied: installation does not
# exist`. Customer compose + scripts/release.sh now default to the same
# namespace; founders can still override locally via env vars.
#
# Security: every interpolation routes through env: blocks. The only
# refs used are github.ref_name (tag), github.repository, github.actor
# and secrets.GITHUB_TOKEN — all controlled by the workflow context,
# not by external user input. No issue/PR/commit text is consumed.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag_name: ${{ steps.tag.outputs.tag }}
      is_prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release-notes can diff against the previous tag

      - name: Identify tag metadata
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          if [[ "$REF_NAME" == *-rc* || "$REF_NAME" == *-beta* || "$REF_NAME" == *-alpha* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release body (commit log since previous tag)
        id: notes
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${REF_NAME}^" 2>/dev/null || echo "")
          VERSION="${REF_NAME#v}"
          {
            echo "# Automatia ABS ${REF_NAME}"
            echo
            if [ -n "$PREV" ]; then
              echo "## Changes since ${PREV}"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" "${PREV}..${REF_NAME}"
            else
              echo "## Changes"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" -n 50 "${REF_NAME}"
            fi
            echo
            echo
            echo "## Docker images"
            echo
            echo "- \`ghcr.io/automatiabcn/abs-backend:${VERSION}\`"
            echo "- \`ghcr.io/automatiabcn/abs-landing:${VERSION}\`"
            echo
            echo "## Provenance"
            echo
            echo "- SBOM (CycloneDX) attached as release asset by .github/workflows/sbom.yml."
            echo "- Cosign keyless signature published to Sigstore Rekor (where package permissions allow)."
            echo "- Source: https://github.com/${REPO_FULL}/tree/${REF_NAME}"
          } > /tmp/release-body.md
          echo "body_path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          prerelease: ${{ steps.tag.outputs.is_prerelease }}
          generate_release_notes: false
          make_latest: ${{ steps.tag.outputs.is_prerelease == 'false' }}

  publish-images:
    # Sprint 2N.1 FAZ B: build + push customer-facing images so cosign-sign
    # has a real target. Previously absent — v1.0.1 release shipped no GHCR
    # manifest (HTTP 404 on docker manifest inspect), blocking smebes upgrade.
    name: Build + push container images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: publish
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: core/backend
            dockerfile: core/backend/Dockerfile
          - name: landing
            context: core/landing
            dockerfile: core/landing/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version (strip leading v)
        id: version
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-rc* || "$VERSION" == *-beta* || "$VERSION" == *-alpha* ]]; then
            echo "tag_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push (stable)
        if: steps.version.outputs.tag_latest == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Multi-arch parity with release.sh (QEMU set up above). Without this
          # the action defaults to the amd64 runner's single platform and
          # overwrites any multi-arch tag with an amd64-only manifest — a
          # regression for arm64 customers who pull the GHCR images.
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/automatiabcn/abs-${{ matrix.name }}:${{ steps.version.outputs.version }}
            ghcr.io/automatiabcn/abs-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Build + push (pre-release, no :latest)
        if: steps.version.outputs.tag_latest != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/automatiabcn/abs-${{ matrix.name }}:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  cosign-sign:
    name: Cosign keyless sign (best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish, publish-images]
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Cosign login to ghcr.io
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cosign login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"

      - name: Sign backend + landing images (keyless)
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          for IMAGE in \
            "ghcr.io/automatiabcn/abs-backend:${VERSION}" \
            "ghcr.io/automatiabcn/abs-landing:${VERSION}"; do
            echo "==> Signing $IMAGE"
            # -y accepts the OIDC identity prompt non-interactively.
            # If the image is not accessible from this workflow's
            # token (cross-namespace), the step exits non-zero and
            # continue-on-error: true keeps the release pipeline green.
            cosign sign -y "$IMAGE" || {
              echo "::warning::cosign sign failed for $IMAGE — package permission may be needed in enzoemir1/* namespace"
              exit 0
            }
          done
