    decision: |
      Brief'teki 30s polling reddedildi (cache 5dk TTL'i ile uyumsuz, 6 provider × 2880 poll/gün = 17K req/tab).
      ABS_ANTHROPIC_TOKEN_LIMIT env (default 1_000_000) eklendi — operator tier'ına göre override eder.
    artefacts:
      - core/backend/app/services/quota_monitor.py (_anthropic_monthly_limit env reader)
