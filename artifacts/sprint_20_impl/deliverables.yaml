deliverables:

  - id: S20.1
    title: Piper TTS service + container (CPML-free)
    decision: |
      Coqui XTTS-v2 reddedildi (CPML non-commercial). Yerine Piper (MIT) kondu.
      Voice modelleri huggingface.co/rhasspy/piper-voices v1.0.0 ref'inden runtime'da indirilir.
    artefacts:
      - infra/piper/Dockerfile (custom python:3.11-slim + piper-tts 1.2.0)
      - infra/piper/server.py (FastAPI HTTP wrapper, /api/tts + /api/voices + /health)
      - infra/docker-compose.dev.yml (piper service)
      - core/backend/app/services/tts.py
      - core/backend/app/api/tts.py (POST /v1/tts/synthesize, GET /v1/tts/voices)
    smoke:
      - "docker exec abs-cj-piper-1 curl /api/tts → 200 RIFF...WAVE 43564 bytes"
      - "backend POST /v1/tts/synthesize via panel session → 200 RIFF...WAVE 42028 bytes"
    voices_supported:
      - tr_TR-fettah-medium (default)
      - en_US-amy-medium
      - es_ES-davefx-medium
    status: PASS

  - id: S20.2
    title: WhisperX standalone transcribe
    decision: |
      meetily image public hub'da yoktu. Yerine onerahmet/openai-whisper-asr-webservice:latest
      kondu (faster-whisper + pyannote, MIT). ASR_MODEL env ile model swap (default `medium`).
      `ABS_WHISPERX_MODEL=large-v3` override mevcut.
    artefacts:
      - infra/docker-compose.dev.yml (whisperx service)
      - core/backend/app/services/transcribe.py (WhisperXUnavailableError + normalize)
      - core/backend/app/api/transcribe.py (POST /v1/transcribe + /v1/transcribe/stream)
    smoke:
      - "POST /asr (whisperx direct) → 200 JSON segments"
      - "POST /v1/transcribe (backend, fixture WAV) → 200 normalized payload (duration, speakers, segments, summary)"
    status: PASS
    notes: |
      Synthetic tone fixture is hallucinated as "Thanks for watching!" by Whisper —
      this is a real ASR response; schema + diarize toggle work as expected.

