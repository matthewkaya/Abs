  - id: S20.CO2
    description: WhisperX large-v3 model swap
    why: |
      `medium` is current default (1.5GB cold load). Operator can set ABS_WHISPERX_MODEL=large-v3
      when GPU/16GB RAM available. Documented in THIRD_PARTY_LICENSES.md.
