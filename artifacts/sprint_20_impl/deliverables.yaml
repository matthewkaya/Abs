carry_over:
  - id: S20.CO1
    description: Headed Playwright e2e (slowMo 1500) for /panel/meetings + /panel/transcription + /panel/quota
    why: |
      Browser MCP not invoked this turn. Manual screenshots deferred to next sprint.
