    title: feature_usage 29-ID catalog + alembic 0004
    artefacts:
      - core/backend/app/services/feature_usage.py (FEATURE_IDS tuple + assert 29)
      - core/backend/app/db/models.py (FeatureUsageLog SQLModel)
      - core/backend/alembic/versions/0004_sprint20_meetings.py
      - core/backend/app/api/system/feature_usage.py (GET /v1/system/feature_usage)
    smoke:
      - "GET /v1/system/feature_usage → 200 feature_count=29 features=[29 rows]"
      - "After TTS+transcribe+upload: 3 features incremented (audio_upload, tts_synthesize, transcribe_meetily)"
    sqlite_compat: |
      No materialized view (SQLite limitation). Aggregation done at query time
      via GROUP BY; sub-millisecond for self-host expected row volumes.
    status: PASS

