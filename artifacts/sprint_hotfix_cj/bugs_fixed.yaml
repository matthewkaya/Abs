  - id: BUG-CJ-006
    severity: critical
    fix_summary: |
      Container ENTRYPOINT script (core/backend/scripts/entrypoint.sh) generates
      RSA-2048 keypair into /app/data on first boot when public.pem/private.pem
      missing; also writes a 14-day demo_license.jwt via app.licensing.generator.
      Dockerfile copies script to /usr/local/bin/abs-entrypoint and chains
      ENTRYPOINT before uvicorn CMD.
    files_touched:
      - core/backend/scripts/entrypoint.sh (new, 1.8 KB, +x)
      - core/backend/Dockerfile
    test_command: |
      docker exec abs-cj-backend-1 ls /app/data | grep -E 'public.pem|private.pem|demo_license.jwt'
    test_result: |
      -rw-r--r-- 1 abs abs    568 Apr 29 15:57 demo_license.jwt
      -rw-r--r-- 1 abs abs   1708 Apr 29 15:57 private.pem
      -rw-r--r-- 1 abs abs    451 Apr 29 15:57 public.pem
    status: PASS

