# T-004 — Cerbos engine configuration.
# Hot-reload watches the policy directory; container mounts ./cerbos/policies
# read-only at /policies.

server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"
  metricsEnabled: true
  playgroundEnabled: false

storage:
  driver: "disk"
  disk:
    directory: /policies
    watchForChanges: true

audit:
  enabled: true
  backend: local
  accessLogsEnabled: true
  decisionLogsEnabled: true
  local:
    storagePath: /var/cerbos/audit

engine:
  defaultPolicyVersion: "default"
  lenientScopeSearch: true

schema:
  enforcement: "warn"
