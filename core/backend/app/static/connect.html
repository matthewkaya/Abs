<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Services — Automatia ABS</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 32px 16px; }
        .wrap { max-width: 880px; margin: 0 auto; }
        h1 { font-size: 28px; margin: 0 0 8px 0; }
        .sub { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .auth-row { background: #1e293b; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
        .auth-row input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; }
        .auth-row button { background: #1e57ac; color: white; border: 0; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        .card { background: #1e293b; border-radius: 10px; padding: 16px; }
        .card.connected { background: #1e3a52; border: 1px solid #1e57ac; }
        .name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .auth { color: #94a3b8; font-size: 12px; }
        .status { margin-top: 12px; font-size: 13px; }
        .status.ok { color: #10b981; }
        .status.fail { color: #ef4444; }
        .status.idle { color: #94a3b8; }
        .meta { color: #64748b; font-size: 11px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
        footer { color: #64748b; font-size: 12px; margin-top: 32px; text-align: center; }
        a { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Connected Services</h1>
        <div class="sub">Smart Link integrations · auto-refresh 60s</div>

        <div class="auth-row">
            <span>Admin token:</span>
            <input id="adminToken" type="password" placeholder="Bearer token from .env (ABS_ADMIN_TOKEN)">
            <button id="loadBtn">Load</button>
        </div>

        <div id="grid" class="grid"></div>

        <footer>
            JSON: <a href="/v1/smart-link/connected-services">/v1/smart-link/connected-services</a> · Source: <a href="/v1/smart-link/providers">/providers</a>
        </footer>
    </div>
    <script>
        const grid = document.getElementById('grid');
        const tokenInput = document.getElementById('adminToken');
        const loadBtn = document.getElementById('loadBtn');

        function makeCard(provider, connected) {
            const c = document.createElement('div');
            c.className = 'card' + (connected ? ' connected' : '');
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = provider.name;
            const auth = document.createElement('div');
            auth.className = 'auth';
            auth.textContent = 'auth: ' + provider.auth_method;
            c.appendChild(name);
            c.appendChild(auth);
            const status = document.createElement('div');
            status.className = 'status ' + (connected ? (connected.last_validated_ok ? 'ok' : 'fail') : 'idle');
            status.textContent = connected
                ? (connected.last_validated_ok ? '✓ validated' : '✗ ' + (connected.last_validated_error || 'never validated'))
                : 'not connected';
            c.appendChild(status);
            if (connected) {
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = 'created ' + (connected.created_at || '?');
                c.appendChild(meta);
            }
            return c;
        }

        async function load() {
            const token = tokenInput.value.trim();
            if (!token) { alert('Enter admin token'); return; }
            try {
                const res = await fetch('/v1/smart-link/connected-services', {
                    headers: { 'Authorization': 'Bearer ' + token },
                });
                if (!res.ok) {
                    grid.textContent = 'Error: ' + res.status;
                    return;
                }
                const data = await res.json();
                while (grid.firstChild) grid.removeChild(grid.firstChild);
                const connectedMap = {};
                (data.connected || []).forEach(c => { connectedMap[c.provider] = c; });
                data.providers.forEach(p => {
                    grid.appendChild(makeCard(p, connectedMap[p.id] || null));
                });
            } catch (e) {
                grid.textContent = 'Network error';
            }
        }

        loadBtn.addEventListener('click', load);
        tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
        // Auto-poll if token already entered
        setInterval(() => { if (tokenInput.value.trim()) load(); }, 60000);
    </script>
</body>
</html>
