<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABS Neural Cosmos</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, rgba(58,157,255,0.18), transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.12), transparent 65%),
                #0a0e14;
    font-family: 'JetBrains Mono', monospace; color: #a0e8af;
  }
  .canvas { position: absolute; inset: 0; }
  .node {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    box-shadow: 0 0 18px currentColor, 0 0 4px currentColor;
    transition: transform 200ms ease;
  }
  .node.cluster  { color: #a855f7; background: #a855f7; width: 18px; height: 18px; }
  .node.tool     { color: #10b981; background: #10b981; width: 10px; height: 10px; }
  .label {
    position: absolute;
    color: #a0e8af; font-size: 11px;
    transform: translate(-50%, 12px);
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    pointer-events: none;
    white-space: nowrap;
  }
  .center-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.92);
    font-size: 18px; font-weight: 600;
    text-align: center;
    pointer-events: none;
  }
  .center-sub {
    color: rgba(160,232,175,0.65);
    font-size: 12px; margin-top: 4px; font-weight: normal;
  }
  svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .edge { stroke: rgba(58,157,255,0.18); stroke-width: 1; fill: none; }
  .edge-active { stroke: rgba(168,85,247,0.65); stroke-width: 2; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }
  .node { animation: pulse 4s ease-in-out infinite; }
  .node:nth-child(2n) { animation-delay: 0.5s; }
  .node:nth-child(3n) { animation-delay: 1.2s; }
  .node:nth-child(5n) { animation-delay: 2.1s; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .center-label { animation: float 6s ease-in-out infinite; }
</style>
</head>
<body>
<div class="canvas">
  <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
    <g class="edges">
      <line class="edge edge-active" x1="500" y1="300" x2="180" y2="120"/>
      <line class="edge"             x1="500" y1="300" x2="820" y2="120"/>
      <line class="edge edge-active" x1="500" y1="300" x2="120" y2="300"/>
      <line class="edge"             x1="500" y1="300" x2="880" y2="300"/>
      <line class="edge"             x1="500" y1="300" x2="180" y2="480"/>
      <line class="edge edge-active" x1="500" y1="300" x2="820" y2="480"/>
      <line class="edge" x1="180" y1="120" x2="80"  y2="60"/>
      <line class="edge" x1="180" y1="120" x2="100" y2="200"/>
      <line class="edge" x1="820" y1="120" x2="920" y2="60"/>
      <line class="edge" x1="820" y1="120" x2="900" y2="200"/>
      <line class="edge" x1="120" y1="300" x2="40"  y2="350"/>
      <line class="edge" x1="880" y1="300" x2="960" y2="350"/>
      <line class="edge" x1="180" y1="480" x2="80"  y2="540"/>
      <line class="edge" x1="180" y1="480" x2="100" y2="420"/>
      <line class="edge" x1="820" y1="480" x2="920" y2="540"/>
      <line class="edge" x1="820" y1="480" x2="900" y2="420"/>
    </g>
  </svg>

  <div class="node cluster" style="left: 18%; top: 20%"></div>
  <div class="label"        style="left: 18%; top: 20%">groq</div>
  <div class="node cluster" style="left: 82%; top: 20%"></div>
  <div class="label"        style="left: 82%; top: 20%">cerebras</div>
  <div class="node cluster" style="left: 12%; top: 50%"></div>
  <div class="label"        style="left: 12%; top: 50%">cloudflare</div>
  <div class="node cluster" style="left: 88%; top: 50%"></div>
  <div class="label"        style="left: 88%; top: 50%">gemini</div>
  <div class="node cluster" style="left: 18%; top: 80%"></div>
  <div class="label"        style="left: 18%; top: 80%">cohere</div>
  <div class="node cluster" style="left: 82%; top: 80%"></div>
  <div class="label"        style="left: 82%; top: 80%">anthropic</div>

  <div class="node tool" style="left: 8%;  top: 10%"></div>
  <div class="node tool" style="left: 10%; top: 33%"></div>
  <div class="node tool" style="left: 92%; top: 10%"></div>
  <div class="node tool" style="left: 90%; top: 33%"></div>
  <div class="node tool" style="left: 4%;  top: 58%"></div>
  <div class="node tool" style="left: 96%; top: 58%"></div>
  <div class="node tool" style="left: 8%;  top: 90%"></div>
  <div class="node tool" style="left: 10%; top: 70%"></div>
  <div class="node tool" style="left: 92%; top: 90%"></div>
  <div class="node tool" style="left: 90%; top: 70%"></div>
  <div class="node tool" style="left: 50%; top: 13%"></div>
  <div class="node tool" style="left: 50%; top: 87%"></div>
  <div class="node tool" style="left: 30%; top: 10%"></div>
  <div class="node tool" style="left: 70%; top: 10%"></div>
  <div class="node tool" style="left: 30%; top: 90%"></div>
  <div class="node tool" style="left: 70%; top: 90%"></div>

  <div class="node" style="left: 50%; top: 50%; width: 28px; height: 28px; color: #fbbf24; background: #fbbf24; transform: translate(-50%,-50%);"></div>

  <div class="center-label">
    ABS Orchestrator
    <div class="center-sub">122 MCP tools · 6 providers · 13 quality pipelines</div>
  </div>
</div>
</body>
</html>
