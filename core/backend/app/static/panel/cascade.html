<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS Cascade Visualiser</title>
  <style>
    body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: #f4f4f6; color: #1f2937; }
    header { background: linear-gradient(135deg,#1e57ac,#3b82f6); color: #fff; padding: 16px 24px; }
    header h1 { margin: 0; font-size: 18px; }
    .container { max-width: 1100px; margin: 16px auto; padding: 0 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
    th, td { padding: 8px 12px; font-size: 13px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f1f5f9; }
    .path { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #1e3a8a; }
    .winner { background: #dcfce7; padding: 2px 6px; border-radius: 4px; font-weight: 600; color: #065f46; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .controls button { padding: 6px 12px; border: 1px solid #1e57ac; background: #fff; color: #1e57ac; border-radius: 6px; cursor: pointer; }
    .controls button:hover { background: #eff6ff; }
  </style>
</head>
<body>
  <header><h1>Provider Cascade Visualiser</h1></header>
  <div class="container">
    <div class="controls">
      <button id="refresh">↻ Refresh</button>
      <button id="export">⬇ Export CSV</button>
      <span id="counter" style="margin-left:auto;font-size:12px;color:#64748b">— flows</span>
    </div>
    <table data-testid="cascade-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Tool</th>
          <th>License</th>
          <th>Path</th>
          <th>Winner</th>
          <th>Latency</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <script>
    let data = { flows: [] };
    async function load() {
      const r = await fetch('/v1/panel/cascade/recent?limit=100');
      data = await r.json();
      document.getElementById('counter').textContent = `${data.flows.length} flows`;
      const tbody = document.getElementById('rows');
      tbody.replaceChildren();
      for (const f of data.flows) {
        const tr = document.createElement('tr');
        const cells = [
          new Date(f.ts).toLocaleString(),
          f.tool || '—',
          (f.license_jti || '').slice(0, 16),
          (f.cascade_path || []).join(' → '),
          f.winner || '—',
          (f.total_latency_ms || 0) + ' ms',
        ];
        cells.forEach((v, i) => {
          const td = document.createElement('td');
          if (i === 3) td.className = 'path';
          if (i === 4) {
            const span = document.createElement('span');
            span.className = 'winner';
            span.textContent = String(v);
            td.appendChild(span);
          } else {
            td.textContent = String(v);
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
    }
    function exportCsv() {
      const rows = [['ts','tool','license_jti','cascade_path','winner','total_latency_ms']];
      for (const f of data.flows) {
        rows.push([f.ts, f.tool, f.license_jti, (f.cascade_path||[]).join('|'), f.winner, f.total_latency_ms]);
      }
      const csv = rows.map(r => r.map(v => `"${(v??'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `cascade_${Date.now()}.csv`;
      a.click();
    }
    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('export').addEventListener('click', exportCsv);
    load();
  </script>
</body>
</html>
