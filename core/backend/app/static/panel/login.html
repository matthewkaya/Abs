<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Automatia ABS · Oturum aç</title>
  <style>
    :root {
      --bg0: #0a0e14;
      --bg1: #0d1117;
      --bg2: #161b22;
      --border: #30363d;
      --text1: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --accent: #58a6ff;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg0);
      color: var(--text1);
      font-family: ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    .sub {
      color: var(--text3);
      font-size: 12px;
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text1);
      outline: none;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      color: #0a0e14;
      border: 0;
      border-radius: 4px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: var(--red);
      font-size: 12px;
      margin-top: 10px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <form id="login-form" class="card" aria-labelledby="login-title">
    <h1 id="login-title">Automatia ABS</h1>
    <div class="sub">Yönetim paneline erişim için oturum açın.</div>

    <label for="email">E-posta</label>
    <input id="email" name="email" type="email" required autocomplete="username" />

    <label for="password">Parola</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" />

    <button type="submit" id="submit-btn">Oturum Aç</button>
    <div class="error" id="error-msg" role="alert" aria-live="polite"></div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Kontrol ediliyor…';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password }),
        });
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          errEl.textContent = data.detail || 'Oturum açılamadı';
          return;
        }
        window.location.href = '/panel';
      } catch (err) {
        errEl.textContent = 'Bağlantı hatası: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Oturum Aç';
      }
    });
  </script>
</body>
</html>
