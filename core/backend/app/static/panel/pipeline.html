<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS Quality Pipeline Viewer</title>
  <style>
    body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: #f4f4f6; color: #1f2937; }
    header { background: linear-gradient(135deg,#1e57ac,#3b82f6); color: #fff; padding: 16px 24px; }
    header h1 { margin: 0; font-size: 18px; }
    .container { max-width: 900px; margin: 16px auto; padding: 0 16px; }
    .run { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(15,23,42,.06); }
    .run header { background: none; padding: 0; color: #1f2937; display: flex; justify-content: space-between; }
    .run h3 { margin: 0; font-size: 14px; color: #0f3a78; }
    .timeline { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .step { flex: 1; min-width: 180px; background: #f1f5f9; padding: 10px; border-radius: 8px; }
    .step .role { font-size: 11px; text-transform: uppercase; color: #64748b; }
    .step .model { font-weight: 600; color: #1e57ac; }
    .step .latency { font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <header><h1>Quality Pipeline (qual_*) — Recent Runs</h1></header>
  <div class="container" id="container" data-testid="pipeline-list"></div>
  <script>
    async function load() {
      const r = await fetch('/v1/panel/pipeline/recent?limit=20');
      const data = await r.json();
      const c = document.getElementById('container');
      c.replaceChildren();
      if (!data.pipeline_runs || data.pipeline_runs.length === 0) {
        const empty = document.createElement('p');
        empty.style.color = '#64748b';
        empty.textContent = 'No qual_* invocations recorded yet. Run "qual_code" or "qual_tr" to populate this view.';
        c.appendChild(empty);
        return;
      }
      for (const run of data.pipeline_runs) {
        const card = document.createElement('div');
        card.className = 'run';
        const head = document.createElement('header');
        const h3 = document.createElement('h3'); h3.textContent = run.tool;
        const ts = document.createElement('span');
        ts.style.fontSize = '12px';
        ts.style.color = '#64748b';
        ts.textContent = run.ts ? new Date(run.ts).toLocaleString() : '';
        head.append(h3, ts);
        const tl = document.createElement('div');
        tl.className = 'timeline';
        for (const step of run.steps || []) {
          const s = document.createElement('div'); s.className = 'step';
          const role = document.createElement('div'); role.className = 'role'; role.textContent = step.role;
          const model = document.createElement('div'); model.className = 'model'; model.textContent = step.model;
          const latency = document.createElement('div'); latency.className = 'latency'; latency.textContent = `${step.latency_ms} ms`;
          s.append(role, model, latency);
          tl.appendChild(s);
        }
        card.append(head, tl);
        c.appendChild(card);
      }
    }
    load();
  </script>
</body>
</html>
