<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS Tool Browser</title>
  <style>
    body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: #f4f4f6; color: #1f2937; }
    header { background: linear-gradient(135deg,#1e57ac,#3b82f6); color: #fff; padding: 16px 24px; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .controls { max-width: 1200px; margin: 16px auto; padding: 0 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .controls input { flex: 1; min-width: 240px; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 6px; }
    .chip { font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #e5e7eb; cursor: pointer; }
    .chip.active { background: #1e57ac; color: #fff; }
    .grid { max-width: 1200px; margin: 16px auto; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 12px; }
    .card { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(15,23,42,.06); cursor: pointer; }
    .card h3 { margin: 0 0 4px 0; font-size: 14px; font-weight: 600; color: #0f3a78; word-break: break-all; }
    .card p { margin: 0; font-size: 12px; color: #475569; line-height: 1.4; }
    .card .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #dbeafe; color: #1e3a8a; margin-top: 6px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; max-width: 600px; width: 100%; border-radius: 10px; padding: 24px; max-height: 80vh; overflow-y: auto; }
    .modal-content h2 { margin-top: 0; font-size: 18px; }
    .modal-content pre { background: #f1f5f9; padding: 8px; border-radius: 6px; font-size: 11px; overflow-x: auto; }
    .modal-close { float: right; background: 0; border: 0; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <header><h1>MCP Tool Browser</h1></header>
  <div class="controls">
    <input id="search" type="search" placeholder="Search 121 tools by name…" />
    <div id="chips"></div>
  </div>
  <div class="grid" id="grid" data-testid="tool-grid"></div>

  <div class="modal" id="modal" data-testid="tool-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <h2 id="modal-name">—</h2>
      <p id="modal-desc"></p>
      <h3>Input schema</h3>
      <pre id="modal-schema"></pre>
    </div>
  </div>

  <script>
    let tools = [];
    let currentCategory = null;

    async function load() {
      const r = await fetch('/v1/panel/tools');
      const data = await r.json();
      tools = data.tools || [];
      renderChips(data.category_counts || {});
      render();
    }

    function renderChips(counts) {
      const el = document.getElementById('chips');
      el.replaceChildren();
      const all = document.createElement('span');
      all.className = 'chip active';
      all.textContent = `All (${tools.length})`;
      all.addEventListener('click', () => { currentCategory = null; refreshChipState(); render(); });
      el.appendChild(all);
      for (const [cat, n] of Object.entries(counts).sort()) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.dataset.cat = cat;
        chip.textContent = `${cat} (${n})`;
        chip.addEventListener('click', () => { currentCategory = cat; refreshChipState(); render(); });
        el.appendChild(chip);
      }
    }

    function refreshChipState() {
      document.querySelectorAll('#chips .chip').forEach((c) => {
        c.classList.toggle('active', c.dataset.cat === currentCategory || (!currentCategory && !c.dataset.cat));
      });
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const grid = document.getElementById('grid');
      grid.replaceChildren();
      const filtered = tools.filter((t) =>
        (!currentCategory || t.category === currentCategory) &&
        (!q || t.name.includes(q) || (t.description || '').toLowerCase().includes(q))
      );
      for (const t of filtered) {
        const card = document.createElement('div');
        card.className = 'card';
        const h = document.createElement('h3'); h.textContent = t.name;
        const p = document.createElement('p'); p.textContent = (t.description || '').slice(0, 140);
        const b = document.createElement('span'); b.className = 'badge'; b.textContent = t.category;
        card.append(h, p, b);
        card.addEventListener('click', () => openModal(t));
        grid.appendChild(card);
      }
    }

    function openModal(t) {
      document.getElementById('modal-name').textContent = t.name;
      document.getElementById('modal-desc').textContent = t.description || '';
      document.getElementById('modal-schema').textContent = JSON.stringify(t.input_schema || {}, null, 2);
      document.getElementById('modal').classList.add('open');
    }
    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));
    document.getElementById('search').addEventListener('input', render);
    load();
  </script>
</body>
</html>
