<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS Tool Browser</title>
  <style>
    /* 2026-05-07 — premium dark theme alignment with parent panel.
       Removed flat blue gradient header strip; replaced with subtle
       border + brand-tinted text. Glass-morphism cards.  */
    :root {
      --bg-0: transparent;          /* let parent panel show through */
      --bg-1: rgba(255,255,255,0.03);
      --bg-2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text-1: #e4e7ee;
      --text-2: #9aa3b2;
      --text-dim: #6b7280;
      --brand: #3a9dff;
      --brand-soft: rgba(58,157,255,0.12);
      --brand-edge: rgba(58,157,255,0.28);
    }
    body { margin: 0; font-family: 'Inter', 'JetBrains Mono', -apple-system, Arial, sans-serif; background: var(--bg-0); color: var(--text-1); }
    header { padding: 14px 24px 12px; border-bottom: 1px solid var(--border); }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-2); text-transform: uppercase; }
    header h1::before { content: '◆ '; color: var(--brand); font-size: 10px; vertical-align: 1px; }
    .controls { max-width: 1200px; margin: 14px auto 0; padding: 0 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .controls input { flex: 1; min-width: 240px; padding: 8px 12px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; color: var(--text-1); font-size: 13px; transition: border-color 120ms ease; }
    .controls input::placeholder { color: var(--text-dim); }
    .controls input:focus { outline: none; border-color: var(--brand-edge); background: var(--bg-2); }
    .chip { font-size: 11px; padding: 4px 10px; border-radius: 999px; background: var(--bg-1); border: 1px solid var(--border); color: var(--text-2); cursor: pointer; transition: all 120ms ease; }
    .chip:hover { color: var(--text-1); border-color: var(--brand-edge); }
    .chip.active { background: var(--brand-soft); color: var(--brand); border-color: var(--brand-edge); }
    .grid { max-width: 1200px; margin: 16px auto; padding: 0 16px 16px; display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 10px; }
    .card { background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 160ms ease; }
    .card:hover { border-color: var(--brand-edge); background: var(--bg-2); transform: translateY(-1px); }
    .card h3 { margin: 0 0 4px 0; font-size: 13px; font-weight: 600; color: var(--brand); word-break: break-all; font-family: 'JetBrains Mono', monospace; }
    .card p { margin: 0; font-size: 11.5px; color: var(--text-2); line-height: 1.45; }
    .card .badge { display: inline-block; font-size: 9.5px; padding: 2px 7px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); margin-top: 8px; letter-spacing: 0.03em; text-transform: uppercase; font-weight: 500; }
    .modal { position: fixed; inset: 0; background: rgba(8,12,20,0.72); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #0d1220; border: 1px solid var(--border); max-width: 600px; width: 100%; border-radius: 12px; padding: 24px; max-height: 80vh; overflow-y: auto; color: var(--text-1); }
    .modal-content h2 { margin-top: 0; font-size: 16px; color: var(--brand); font-family: 'JetBrains Mono', monospace; }
    .modal-content pre { background: rgba(0,0,0,0.35); border: 1px solid var(--border); padding: 10px 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; color: var(--text-1); }
    .modal-close { float: right; background: 0; border: 0; font-size: 18px; color: var(--text-2); cursor: pointer; }
    .modal-close:hover { color: var(--text-1); }
  </style>
</head>
<body>
  <header><h1>MCP Tool Browser</h1></header>
  <div class="controls">
    <input id="search" type="search" placeholder="Search 121 tools by name…" />
    <div id="chips"></div>
  </div>
  <div class="grid" id="grid" data-testid="tool-grid"></div>

  <div class="modal" id="modal" data-testid="tool-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <h2 id="modal-name">—</h2>
      <p id="modal-desc"></p>
      <h3>Input schema</h3>
      <pre id="modal-schema"></pre>
    </div>
  </div>

  <script>
    let tools = [];
    let currentCategory = null;

    async function load() {
      const r = await fetch('/v1/panel/tools');
      const data = await r.json();
      tools = data.tools || [];
      renderChips(data.category_counts || {});
      render();
    }

    function renderChips(counts) {
      const el = document.getElementById('chips');
      el.replaceChildren();
      const all = document.createElement('span');
      all.className = 'chip active';
      all.textContent = `All (${tools.length})`;
      all.addEventListener('click', () => { currentCategory = null; refreshChipState(); render(); });
      el.appendChild(all);
      for (const [cat, n] of Object.entries(counts).sort()) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.dataset.cat = cat;
        chip.textContent = `${cat} (${n})`;
        chip.addEventListener('click', () => { currentCategory = cat; refreshChipState(); render(); });
        el.appendChild(chip);
      }
    }

    function refreshChipState() {
      document.querySelectorAll('#chips .chip').forEach((c) => {
        c.classList.toggle('active', c.dataset.cat === currentCategory || (!currentCategory && !c.dataset.cat));
      });
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const grid = document.getElementById('grid');
      grid.replaceChildren();
      const filtered = tools.filter((t) =>
        (!currentCategory || t.category === currentCategory) &&
        (!q || t.name.includes(q) || (t.description || '').toLowerCase().includes(q))
      );
      for (const t of filtered) {
        const card = document.createElement('div');
        card.className = 'card';
        const h = document.createElement('h3'); h.textContent = t.name;
        const p = document.createElement('p'); p.textContent = (t.description || '').slice(0, 140);
        const b = document.createElement('span'); b.className = 'badge'; b.textContent = t.category;
        card.append(h, p, b);
        card.addEventListener('click', () => openModal(t));
        grid.appendChild(card);
      }
    }

    function openModal(t) {
      document.getElementById('modal-name').textContent = t.name;
      document.getElementById('modal-desc').textContent = t.description || '';
      document.getElementById('modal-schema').textContent = JSON.stringify(t.input_schema || {}, null, 2);
      document.getElementById('modal').classList.add('open');
    }
    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));
    document.getElementById('search').addEventListener('input', render);
    load();
  </script>
</body>
</html>
