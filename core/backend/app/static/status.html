<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status — Automatia ABS</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 32px 16px; }
        .wrap { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 28px; margin: 0 0 8px 0; color: #e2e8f0; }
        .sub { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-weight: 600; font-size: 13px; margin-left: 8px; }
        .ok { background: #065f46; color: #a7f3d0; }
        .degraded { background: #78350f; color: #fed7aa; }
        .down { background: #7f1d1d; color: #fecaca; }
        .grid { display: grid; gap: 12px; margin-top: 24px; }
        .svc { background: #1e293b; border-radius: 8px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .svc.fail { background: #3f1d1d; }
        .name { font-weight: 600; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-ok { background: #10b981; }
        .dot-fail { background: #ef4444; }
        .meta { color: #94a3b8; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
        footer { color: #64748b; font-size: 12px; margin-top: 32px; text-align: center; }
        a { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>
            Automatia ABS
            <span id="overall" class="badge">…</span>
        </h1>
        <div class="sub">
            <span id="version">…</span> · uptime <span id="uptime">…</span> · auto-refresh 30s
        </div>
        <div id="services" class="grid"></div>
        <footer>
            JSON: <a href="/v1/status">/v1/status</a> · Source: <a href="https://github.com/automatiabcn/abs">github.com/automatiabcn/abs</a>
        </footer>
    </div>
    <script>
        function makeServiceCard(s) {
            const card = document.createElement('div');
            card.className = 'svc ' + (s.ok ? 'ok' : 'fail');
            const left = document.createElement('div');
            const dot = document.createElement('span');
            dot.className = 'dot ' + (s.ok ? 'dot-ok' : 'dot-fail');
            const name = document.createElement('span');
            name.className = 'name';
            name.textContent = s.name;
            left.appendChild(dot);
            left.appendChild(name);
            const right = document.createElement('div');
            right.className = 'meta';
            const meta = Object.entries(s)
                .filter(([k]) => !['name', 'ok', 'error'].includes(k))
                .map(([k, v]) => k + '=' + v)
                .join(' · ');
            right.textContent = s.error ? String(s.error) : (meta || (s.ok ? 'healthy' : 'down'));
            card.appendChild(left);
            card.appendChild(right);
            return card;
        }
        async function refresh() {
            try {
                const res = await fetch('/v1/status');
                const data = await res.json();
                const overall = document.getElementById('overall');
                overall.textContent = String(data.overall).toUpperCase();
                overall.className = 'badge ' + data.overall;
                document.getElementById('version').textContent = 'v' + data.version;
                const u = data.uptime_seconds;
                const h = Math.floor(u / 3600);
                const m = Math.floor((u % 3600) / 60);
                document.getElementById('uptime').textContent = h + 'h ' + m + 'm';
                const grid = document.getElementById('services');
                while (grid.firstChild) grid.removeChild(grid.firstChild);
                data.services.forEach(s => grid.appendChild(makeServiceCard(s)));
            } catch (e) {
                const overall = document.getElementById('overall');
                overall.textContent = 'UNREACHABLE';
                overall.className = 'badge down';
            }
        }
        refresh();
        setInterval(refresh, 30000);
    </script>
</body>
</html>
