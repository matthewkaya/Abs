# =============================================================================
# ABS Customer Stack — root-level compose for the `git clone && docker compose up`
# customer flow. Functionally identical to infra/docker-compose.customer.yml,
# with paths adjusted for execution from repo root.
# -----------------------------------------------------------------------------
# Customer flow:
#   git clone https://github.com/automatiabcn/abs.git
#   cd abs
#   cp .env.example .env
#   nano .env   # paste ABS_LICENSE_KEY (from welcome email) + provider API keys
#   docker compose up -d
#   # backend healthy in ~30-60s, then visit https://<your-domain>/setup
#
# IP surface: pull-image-only deployment. NO build context. Backend (FastAPI)
# and landing (Next.js) ship as pre-built images on GHCR. Forking is impossible
# — customers consume binaries, not source.
#
# Required .env vars (template in .env.example):
#   ABS_LICENSE_KEY      — your signed license JWT (separate "license is ready" email)
#   ABS_PUBLIC_HOSTNAME  — your domain (e.g. abs.mycompany.com) or sslip.io alias
#   ABS_PUBLIC_URL       — full https URL (https://${ABS_PUBLIC_HOSTNAME})
#   ABS_ACME_EMAIL       — Let's Encrypt contact email
#   ABS_VAULT_KEY        — 32-byte base64; generate with `openssl rand -base64 32`
#   ABS_VERSION          — image tag (default 1.0.0-rc2)
#   plus at least one provider key — ANTHROPIC_API_KEY recommended
# =============================================================================

services:
  # vault-init — one-shot master-key bootstrap (see docker-compose.customer.yml
  # for the full rationale). Generates the age master key in abs-vault-key if
  # missing, then exits. Backend mounts the volume :ro; this is the only writer.
  # Removes the manual `infra/scripts/init_vault.sh` prerequisite that, when
  # skipped, left the vault uninitialised (provider keys silently lost — UAT-012).
  vault-init:
    image: ghcr.io/${ABS_GHCR_NAMESPACE:-automatiabcn}/abs-backend:${ABS_VERSION:-latest}
    pull_policy: always
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        # Mount at /app/vault-key so the fresh volume inherits abs:abs (uid 1000)
        # ownership from the image; /vault-key would be root-owned → EACCES.
        if [ -f /app/vault-key/age.key ]; then
          echo "[vault-init] age.key present — nothing to do"
          exit 0
        fi
        echo "[vault-init] no master key found — generating age key..."
        age-keygen -o /app/vault-key/age.key
        chmod 600 /app/vault-key/age.key
        echo "[vault-init] master key created — BACK IT UP OFFSITE (loss = keys unrecoverable)"
    volumes:
      - abs-vault-key:/app/vault-key
    restart: "no"

  backend:
    image: ghcr.io/${ABS_GHCR_NAMESPACE:-automatiabcn}/abs-backend:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    environment:
      # BUG-27 — point RAG/Cerbos at the in-stack services declared below.
      ABS_QDRANT_URL: "${ABS_QDRANT_URL:-http://qdrant:6333}"
      ABS_CERBOS_HOST: "${ABS_CERBOS_HOST:-http://cerbos:3592}"
      # Default to the deterministic stdlib backend; opt-in to
      # sentence_transformers via .env after `pip install` in a sidecar.
      ABS_EMBEDDING_BACKEND: "${ABS_EMBEDDING_BACKEND:-mock}"
      ABS_EMBEDDING_MODEL_PATH: "${ABS_EMBEDDING_MODEL_PATH:-/app/data/models/bge-m3}"
      HF_HOME: "/app/data/models/hf-cache"
      # BUG-29 — Knowledge graph wiring.
      ABS_NEO4J_URI: "${ABS_NEO4J_URI:-bolt://neo4j:7687}"
      ABS_NEO4J_USER: "${ABS_NEO4J_USER:-neo4j}"
      ABS_NEO4J_PASSWORD: "${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
    expose:
      - "8000"
    volumes:
      - abs-data:/app/data
      - abs-vault-key:/app/vault-key:ro
    depends_on:
      vault-init:
        # Master age key must exist before boot — else vault loads empty
        # and provider-key saves can't persist (UAT-012).
        condition: service_completed_successfully
      qdrant:
        # qdrant image has no curl/wget/nc/bash so a /dev/tcp probe always
        # fails; rely on `service_started` + backend's own qdrant_client
        # retry instead of an unreliable HEALTHCHECK.
        condition: service_started
      cerbos:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=4).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 6

  landing:
    image: ghcr.io/${ABS_GHCR_NAMESPACE:-automatiabcn}/abs-landing:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    environment:
      ABS_BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_SITE_URL: "${ABS_PUBLIC_URL:-https://abs.local}"
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  email-cron:
    image: ghcr.io/${ABS_GHCR_NAMESPACE:-automatiabcn}/abs-backend:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    command: ["sh", "-c", "while true; do python infra/scripts/email_tick.py; sleep 300; done"]
    volumes:
      - abs-data:/app/data
      - abs-vault-key:/app/vault-key:ro
      - ./infra/scripts:/app/infra/scripts:ro
    # Sprint 2B — override the backend HEALTHCHECK (probes :8000 which
    # the cron loop never binds). Process-based probe matches the sleep
    # loop's name so the container reports healthy within ~30s.
    healthcheck:
      # backend image (debian:slim) doesn't ship procps — pgrep missing.
      # POSIX-safe /proc walk + grep instead.
      test:
        - "CMD-SHELL"
        - "for d in /proc/[0-9]*; do grep -q email_tick \"$$d/cmdline\" 2>/dev/null && exit 0; done; exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # BUG-27 — Qdrant vector store backing /v1/rag/*.
  qdrant:
    image: qdrant/qdrant:v1.10.0
    expose:
      - "6333"
    volumes:
      - abs-qdrant-data:/qdrant/storage
    # No HEALTHCHECK — qdrant image has no curl/wget/nc/bash so docker
    # has no portable probe. Backend uses its own qdrant_client retry +
    # the /v1/rag/* graceful 503 wrappers instead.
    restart: unless-stopped

  # BUG-27 — Cerbos PDP for tenant-scoped RAG access. Policies live in
  # ./infra/cerbos so the customer flow's `git clone` brings them along.
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.40.0
    # /cerbos is the cerbos binary inside the image, so we cannot bind-mount
    # a directory there. Mount at /etc/cerbos and point --config at it.
    command: ["server", "--config=/etc/cerbos/config.yaml"]
    expose:
      - "3592"
      - "3593"
    volumes:
      - ./infra/cerbos:/etc/cerbos:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # BUG-29 — Neo4j 5.20-community for /v1/graph/*. Heap pinned at 512m so
  # a 4 GB Hetzner CX22 hosts the full ABS stack without swapping.
  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: "${ABS_NEO4J_USER:-neo4j}/${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    expose:
      - "7687"
    volumes:
      - abs-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_AUTH%/*} -p $${NEO4J_AUTH#*/} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  caddy:
    image: caddy:2
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile.customer:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  abs-data:
  abs-vault-key:
  caddy-data:
  caddy-config:
  abs-qdrant-data:
  abs-neo4j-data:
