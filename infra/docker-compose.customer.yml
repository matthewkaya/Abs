# =============================================================================
# ABS Customer Stack — pull-image-only deployment.
# -----------------------------------------------------------------------------
# Customers run this compose. NO source code, NO build context: forking is
# impossible because backend (FastAPI) and landing (Next.js) ship as
# pre-built images on GitHub Container Registry. Founder dev workflow
# stays on infra/docker-compose.yml (which has build: contexts).
# Q12 IP-Hardening R3 reference: docs/RUNBOOK_HETZNER_PILOT.md.
# -----------------------------------------------------------------------------
# Required env vars (set these in `.env` next to this file):
#   ABS_LICENSE_KEY      — your signed license JWT, sent in a separate
#                          email after purchase. Paste the full token on
#                          one line, no quotes. The backend phones home
#                          to validate it on every boot (fail-open for
#                          7 days if the activation server is offline).
#   ABS_PUBLIC_HOSTNAME  — your domain (e.g. abs.mycompany.com) or, for
#                          a no-DNS smoke test, a sslip.io alias such as
#                          203-0-113-7.sslip.io.
#   ABS_PUBLIC_URL       — full https URL (https://${ABS_PUBLIC_HOSTNAME}).
#                          Next.js needs this for absolute links + canonical.
#   ABS_ACME_EMAIL       — Let's Encrypt contact email for cert renewal
#                          notices. Required by Caddy ACME defaults.
#   ABS_VERSION          — image tag, default 1.0.0-rc2. Don't change unless
#                          your support contact tells you to.
#   ABS_VAULT_KEY        — 32-byte base64 secret encrypting the local vault
#                          (provider keys, OAuth state). Generate once with
#                          `openssl rand -base64 32` then keep it backed up.
#
# First-run checklist:
#   1. Create .env with the keys listed above.
#   2. cat ghcr_pull.token | docker login ghcr.io -u <your-github-user> --password-stdin
#   3. docker compose pull
#   4. docker compose up -d
#   5. Visit https://${ABS_PUBLIC_HOSTNAME}/setup to finish admin onboarding
#      (the license itself is already loaded from ABS_LICENSE_KEY at boot).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # backend — FastAPI app (auth, MCP gateway, RAG, billing, admin API).
  # Runs the license verifier on boot and pre-warms Cerbos PDP. Internal
  # port 8000 only; Caddy proxies /v1/*, /auth/*, /setup*, /healthz, /mcp*.
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/enzoemir1/abs-backend:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    environment:
      # Sprint 2N FAZ C (P0 #2M-026) — Postgres default for customer
      # compose so the Sprint 2K RLS migration (0015_rls_audit_tables)
      # is active by default. SQLite legacy stays available via
      # ABS_DATABASE_URL=sqlite:////app/data/abs.db in .env.
      ABS_DATABASE_URL: "${ABS_DATABASE_URL:-postgresql+psycopg://abs:${ABS_DB_PASSWORD}@postgres:5432/abs}"
      # BUG-27 — point RAG/Cerbos at the in-stack services declared below.
      # Customers can override either URL in .env if they front-load their
      # own Qdrant/Cerbos clusters; defaults match the compose service names.
      ABS_QDRANT_URL: "${ABS_QDRANT_URL:-http://qdrant:6333}"
      ABS_CERBOS_HOST: "${ABS_CERBOS_HOST:-http://cerbos:3592}"
      # Default to the deterministic stdlib backend so first boot works
      # with zero extra disk + no GPU. The mock embedder uses sha256-derived
      # vectors so identical chunks land near-identical points — semantic
      # retrieval is approximate but technically real Qdrant results, no
      # silent UI mocks. Override to `sentence_transformers` after `pip
      # install sentence-transformers` to unlock proper BGE-M3 semantics
      # (see env.example for the upgrade recipe).
      ABS_EMBEDDING_BACKEND: "${ABS_EMBEDDING_BACKEND:-mock}"
      ABS_EMBEDDING_MODEL_PATH: "${ABS_EMBEDDING_MODEL_PATH:-/app/data/models/bge-m3}"
      HF_HOME: "/app/data/models/hf-cache"
      # BUG-29 — Knowledge graph wiring. Neo4j 5.20-community ships with the
      # stack; admin /panel/graph runs Cypher against this driver.
      ABS_NEO4J_URI: "${ABS_NEO4J_URI:-bolt://neo4j:7687}"
      ABS_NEO4J_USER: "${ABS_NEO4J_USER:-neo4j}"
      ABS_NEO4J_PASSWORD: "${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
    expose:
      # Internal-only — Caddy is the only edge. Never publish 8000.
      - "8000"
    volumes:
      # abs-data: license cache, RSA keys, SQLite RAG index, audit log,
      # plus the BGE-M3 model cache so first-boot download is one-shot.
      - abs-data:/app/data
      # abs-vault-key: 32-byte secret used to AES-GCM encrypt vault rows.
      # Mounted read-only; the backend doesn't need to rotate it at runtime.
      - abs-vault-key:/app/vault-key:ro
    depends_on:
      postgres:
        # Sprint 2N FAZ C — wait for Postgres before backend boot.
        # Backend entrypoint runs `alembic upgrade head` so the schema
        # (incl. Sprint 2K RLS policies) is current before serving.
        condition: service_healthy
      qdrant:
        # qdrant image has no curl/wget/nc/bash so a /dev/tcp probe always
        # fails; rely on `service_started` + backend's own qdrant_client
        # retry instead of an unreliable HEALTHCHECK.
        condition: service_started
      cerbos:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Python urllib probe — `curl`/`wget` are stripped from the image to
      # shrink IP surface. /healthz returns 200 only after license + DB
      # + Cerbos pre-warm succeed, so this gates downstream services.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=4).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # landing — Next.js standalone build (marketing pages + /panel admin UI).
  # Talks to backend over the docker network at http://backend:8000.
  # Caddy routes everything that isn't a backend path here.
  # ---------------------------------------------------------------------------
  landing:
    image: ghcr.io/enzoemir1/abs-landing:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    environment:
      # Internal API base URL — Next.js server-side calls hit backend
      # directly inside the docker network (faster than going via Caddy).
      ABS_BACKEND_URL: "http://backend:8000"
      # Public origin — used for absolute URLs, OG tags, canonical links.
      NEXT_PUBLIC_SITE_URL: "${ABS_PUBLIC_URL:-https://abs.local}"
      # Disable Next telemetry on customer hosts (privacy + offline air-gap).
      NEXT_TELEMETRY_DISABLED: "1"
      # Bind on all interfaces so the docker DNS name resolves.
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      backend:
        # Don't start landing until backend is healthy — otherwise the
        # /panel pages 500 because /v1/license/info isn't ready yet.
        condition: service_healthy
    healthcheck:
      # Node-only HTTP check — no curl/wget in the standalone image.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # email-cron — out-of-band tick that ships transactional emails (digest,
  # invoice receipts, NPS, password resets). Sleeps 5 min between runs.
  # Reuses the backend image so license + vault unlock work identically.
  # ---------------------------------------------------------------------------
  email-cron:
    image: ghcr.io/enzoemir1/abs-backend:${ABS_VERSION:-latest}
    pull_policy: always
    env_file: .env
    command: ["sh", "-c", "while true; do python infra/scripts/email_tick.py; sleep 300; done"]
    volumes:
      # Shares abs-data so the cron sees the same DB/license as backend.
      - abs-data:/app/data
      - abs-vault-key:/app/vault-key:ro
      # Mounts the script directory read-only — script lives in the image
      # but bind-mounting allows hot-patching without re-pulling.
      - ./scripts:/app/infra/scripts:ro
    # Sprint 2B — the cron container reuses the backend image, but its
    # entrypoint is the email_tick loop, not the FastAPI server. The
    # backend Dockerfile HEALTHCHECK probes :8000 which never binds in
    # this container, so the inherited healthcheck would mark email-cron
    # unhealthy forever (failing streak 58+ on Hetzner pre-rc7).
    # Override with a process probe that matches the sleep-loop.
    healthcheck:
      # The backend image is debian:slim without procps, so pgrep is
      # missing. Walk /proc/[0-9]*/cmdline (every Linux container mounts
      # /proc) and look for the email_tick string in any process's
      # argv. POSIX sh + grep are guaranteed.
      test:
        - "CMD-SHELL"
        - "for d in /proc/[0-9]*; do grep -q email_tick \"$$d/cmdline\" 2>/dev/null && exit 0; done; exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # qdrant — vector store backing /v1/rag/* (BUG-27 fix). Single-node
  # community image is enough for the customer self-host envelope (≤ 1M
  # chunks). Persistence lives in the named volume so an upgrade keeps
  # ingested embeddings; `docker compose down -v` wipes them.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.10.0
    expose:
      - "6333"
    volumes:
      - abs-qdrant-data:/qdrant/storage
    # No HEALTHCHECK — qdrant image has no curl/wget/nc/bash so docker
    # has no portable probe. Backend uses its own qdrant_client retry +
    # the /v1/rag/* graceful 503 wrappers instead.
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # cerbos — policy decision point for /v1/rag/* and /v1/projects/* (T-004,
  # T-012). Policies are baked into the backend image at /app/cerbos/policies
  # and bind-mounted into cerbos read-only here.
  #
  # IMPORTANT — bundle layout (Sprint 2J FAZ C, BUG-2J-C-01):
  # The `./cerbos/` directory next to this compose MUST contain BOTH
  # `config.yaml` AND `policies/`. Do NOT copy from the repo-root
  # `cerbos/` (which only ships policies); the canonical bundle lives
  # at `infra/cerbos/`. Customer-side, `scripts/customer_onboard.sh`
  # copies the correct bundle into `customer-keys/<slug>/cerbos/` —
  # ship that to the customer, not the repo-root directory.
  # ---------------------------------------------------------------------------
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.40.0
    # /cerbos is the cerbos binary inside the image, so we cannot bind-mount
    # a directory there. Mount at /etc/cerbos and point --config at it.
    command: ["server", "--config=/etc/cerbos/config.yaml"]
    expose:
      - "3592"
      - "3593"
    volumes:
      - ./cerbos:/etc/cerbos:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # neo4j — knowledge graph backing /v1/graph/* (BUG-29 fix). Community
  # 5.20 with APOC. Heap pinned at 512m so a 4 GB Hetzner CX22 can host
  # the full ABS stack without swapping. Bolt only — no HTTP exposure.
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: "${ABS_NEO4J_USER:-neo4j}/${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    expose:
      - "7687"
    volumes:
      - abs-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_AUTH%/*} -p $${NEO4J_AUTH#*/} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # postgres — Sprint 2N FAZ C (P0 #2M-026) — KVKK defense-in-depth DB.
  #
  # Sprint 2K shipped Row-Level Security on the audit_*/tenant_* tables,
  # but the customer compose previously had no Postgres service, so backend
  # silently fell back to SQLite and RLS was never engaged. From 1.0.1
  # onwards Postgres is the default; SQLite stays opt-in via
  # ABS_DATABASE_URL=sqlite:////app/data/abs.db in .env (legacy, single-
  # tenant only — RLS policies are no-op on SQLite).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: abs
      POSTGRES_PASSWORD: "${ABS_DB_PASSWORD:?ABS_DB_PASSWORD env required — generate with openssl rand -base64 32}"
      POSTGRES_DB: abs
    volumes:
      - abs-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abs -d abs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # caddy — reverse proxy + automatic Let's Encrypt TLS.
  # Reads infra/Caddyfile (must be `infra/Caddyfile.customer` copied to
  # ./Caddyfile next to this compose).
  # Ports 80 + 443 must be reachable from the public internet for
  # ACME HTTP-01 challenge to succeed.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      # 80 must stay open for ACME HTTP-01 — Caddy auto-redirects to 443.
      - "80:80"
      # 443: live HTTPS. Cert auto-renewed every ~60 days.
      - "443:443"
    volumes:
      # Caddyfile is bind-mounted read-only so customers can edit it without
      # rebuilding the caddy image (e.g. add basic auth on /panel).
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy-data: persists ACME account + issued certs across restarts.
      # Losing this volume forces a full re-issue — back it up nightly.
      - caddy-data:/data
      # caddy-config: Caddy's autosaved running config (rare but useful).
      - caddy-config:/config
    restart: unless-stopped

# Named volumes — managed by docker, persist across `docker compose down`.
# Run `docker compose down -v` to wipe them (license + certs go too).
volumes:
  abs-data:
  abs-vault-key:
  caddy-data:
  caddy-config:
  # BUG-27 — qdrant payload + vectors. Survives container recreate; wiped
  # only by `docker compose down -v`. Keep the name stable across upgrades.
  abs-qdrant-data:
  # BUG-29 — neo4j graph + transaction logs. Same persistence contract as
  # qdrant: stable across upgrades, wiped only by an explicit volume drop.
  abs-neo4j-data:
  # Sprint 2N FAZ C (P0 #2M-026) — Postgres RLS-backed audit + tenant
  # tables. Single named volume; back this up nightly alongside abs-data.
  abs-postgres-data:
