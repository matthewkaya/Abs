# Dev compose overlay. Adds developer-only infra (NATS JetStream + Cerbos).
# Use:  docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up
# Production never includes this file.

services:
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.39.0
    command: ["server", "--config=/etc/cerbos/.cerbos.yaml"]
    ports:
      - "3592:3592"  # HTTP
      - "3593:3593"  # gRPC
    volumes:
      - ../cerbos/.cerbos.yaml:/etc/cerbos/.cerbos.yaml:ro
      - ../cerbos/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - abs-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # S20.1 — Piper TTS HTTP wrapper (MIT, https://github.com/rhasspy/piper).
  piper:
    build: ./piper
    container_name: abs-cj-piper-1
    ports:
      - "5002:5002"
    volumes:
      - abs-piper-models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5002/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # S20.2 — WhisperX standalone (MIT, faster-whisper + pyannote diarize).
  # Image: onerahmet/openai-whisper-asr-webservice — model set via ASR_MODEL env.
  # Default `medium` keeps cold-start under 8GB RAM; operator can switch to
  # `large-v3` by overriding ASR_MODEL when GPU/RAM is available.
  whisperx:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: abs-cj-whisperx-1
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: ${ABS_WHISPERX_MODEL:-medium}
      ASR_ENGINE: faster_whisper
    volumes:
      - abs-whisperx-models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    container_name: abs-cj-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-AbsNeo2026!}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_server_default__listen__address=0.0.0.0
    volumes:
      - abs-neo4j-data:/data
      - abs-neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    # Q7 Phase B finalize — dev overlay mounts the host docker socket so the
    # PluginSandbox class (`app/marketplace/sandbox.py`) can launch plugin
    # containers from inside the backend. Production runs the sandbox
    # against a remote dockerd / Kubernetes API and never includes this file.
    user: "0:0"  # root in dev so docker.sock (root:0660) is reachable
    ports:
      - "8000:8000"   # dev — direct access for Playwright + manual tests
    environment:
      ABS_NATS_URL: "nats://nats:4222"
      ABS_CERBOS_HOST: "cerbos:3593"
      ABS_PIPER_URL: "http://piper:5002"
      ABS_WHISPERX_URL: "http://whisperx:9000"
      # Q3 P3 / Q4 P10 — cascade mock mode override (off by default).
      ABS_ANTHROPIC_MOCK_MODE: "${ABS_ANTHROPIC_MOCK_MODE:-off}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nats:
        condition: service_healthy
      cerbos:
        condition: service_healthy

volumes:
  abs-nats-data:
  abs-piper-models:
  abs-whisperx-models:
  abs-neo4j-data:
  abs-neo4j-logs:
