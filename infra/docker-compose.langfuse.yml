# T-017 — LangFuse dev compose overlay (matches Helm topology lite).
# docker compose -f infra/docker-compose.yml \
#                -f infra/docker-compose.dev.yml \
#                -f infra/docker-compose.langfuse.yml up -d langfuse-web langfuse-worker

services:
  langfuse-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - abs-langfuse-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - abs-langfuse-ch:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "langfuse"]
    volumes:
      - abs-langfuse-redis:/data

  langfuse-minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - abs-langfuse-minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  langfuse-web:
    image: langfuse/langfuse:3.31.0
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse"
      CLICKHOUSE_URL: "http://langfuse-clickhouse:8123"
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # T-Q08 — env-var refs so a leaked .env never lands in the compose file.
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env (dev or prod)}"
      SALT: "${LANGFUSE_SALT:?set LANGFUSE_SALT in .env (dev or prod)}"
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-postgres: { condition: service_healthy }
      langfuse-clickhouse: { condition: service_healthy }
      langfuse-redis: { condition: service_started }
      langfuse-minio: { condition: service_started }

  langfuse-worker:
    image: langfuse/langfuse-worker:3.31.0
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse"
      CLICKHOUSE_URL: "http://langfuse-clickhouse:8123"
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      REDIS_HOST: langfuse-redis
      REDIS_AUTH: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    depends_on:
      langfuse-web: { condition: service_started }

volumes:
  abs-langfuse-pg:
  abs-langfuse-ch:
  abs-langfuse-redis:
  abs-langfuse-minio:
