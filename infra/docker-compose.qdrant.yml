# T-009 — Qdrant overlay (vector DB with snapshot/backup volume).
# Compose with the dev base via:
#   docker compose -f infra/docker-compose.yml \
#                  -f infra/docker-compose.dev.yml \
#                  -f infra/docker-compose.qdrant.yml up -d qdrant

services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"   # HTTP / OpenAPI
      - "6334:6334"   # gRPC
    volumes:
      - abs-qdrant-storage:/qdrant/storage
      - abs-qdrant-snapshots:/qdrant/snapshots
    environment:
      QDRANT__SERVICE__ENABLE_TLS: "false"
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/snapshots
      QDRANT__LOG_LEVEL: INFO
      QDRANT__TELEMETRY_DISABLED: "true"
      # Production overlays should set QDRANT__SERVICE__API_KEY explicitly.
      # Leaving the variable unset disables auth entirely (dev mode).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/readyz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    environment:
      ABS_QDRANT_URL: "http://qdrant:6333"
      ABS_QDRANT_API_KEY: "${ABS_QDRANT_API_KEY:-}"
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  abs-qdrant-storage:
  abs-qdrant-snapshots:
