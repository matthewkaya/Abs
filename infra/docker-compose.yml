services:
  # vault-init — one-shot age master-key bootstrap (see customer compose for
  # full rationale). Generates /vault-key/age.key if missing, then exits.
  # Backend mounts abs-vault-key :ro; this is the only writer. Replaces the
  # manual infra/scripts/init_vault.sh prerequisite (UAT-012).
  vault-init:
    build: ../core/backend
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        # Mount at /app/vault-key so the fresh volume inherits abs:abs (uid 1000)
        # ownership from the image; /vault-key would be root-owned → EACCES.
        if [ -f /app/vault-key/age.key ]; then
          echo "[vault-init] age.key present — nothing to do"; exit 0
        fi
        echo "[vault-init] generating age master key..."
        age-keygen -o /app/vault-key/age.key
        chmod 600 /app/vault-key/age.key
        echo "[vault-init] master key created — BACK IT UP OFFSITE"
    volumes:
      - abs-vault-key:/app/vault-key
    restart: "no"

  backend:
    build: ../core/backend
    env_file: .env
    environment:
      # Full-feature wiring — turn the headline features ON by default so a
      # fresh install isn't silently mock-only. .env can still override.
      ABS_EMBEDDING_BACKEND: "${ABS_EMBEDDING_BACKEND:-ollama}"
      ABS_EMBEDDING_MODEL: "${ABS_EMBEDDING_MODEL:-bge-m3}"          # 1024-dim, multilingual
      ABS_OLLAMA_URL: "${ABS_OLLAMA_URL:-http://ollama:11434}"
      # cross-encoder rerank via Cohere (pkg in image). Real when a Cohere
      # provider key is entered; get_reranker() degrades to mock otherwise.
      ABS_RERANK_BACKEND: "${ABS_RERANK_BACKEND:-cohere}"
      ABS_TRANSCRIBE_BACKEND: "${ABS_TRANSCRIBE_BACKEND:-whisperx}"  # Meetings → real ASR
      ABS_WHISPERX_URL: "${ABS_WHISPERX_URL:-http://whisperx:9000}"
      ABS_NEO4J_URI: "${ABS_NEO4J_URI:-bolt://neo4j:7687}"           # Knowledge Graph
      ABS_NEO4J_USER: "${ABS_NEO4J_USER:-neo4j}"
      ABS_NEO4J_PASSWORD: "${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
      ABS_CERBOS_HOST: "${ABS_CERBOS_HOST:-http://cerbos:3592}"      # fine-grained authz
      ABS_QDRANT_URL: "${ABS_QDRANT_URL:-http://qdrant:6333}"        # /v1/rag/* vector store
      # Secrets vault — fail fast at boot if sops/age is missing instead of
      # booting and silently erroring every secret op. The image always ships
      # both binaries, so this is defence-in-depth against a tampered/regressed
      # image. (Vault never writes plaintext — encrypt/decrypt both hard-require
      # the binaries — this just surfaces a missing-binary regression loudly.)
      ABS_VAULT_REQUIRE_SOPS: "${ABS_VAULT_REQUIRE_SOPS:-true}"
    expose:
      - "8000"
    volumes:
      - abs-data:/app/data
      - abs-vault-key:/app/vault-key:ro    # 013 — master key ayrı volume, read-only
    # Only vault-init is a hard prerequisite (vault must load before provider
    # saves). neo4j/cerbos/qdrant/ollama/whisperx are reached lazily with their
    # own retry + graceful-503 wrappers, so a hiccup in one feature service must
    # NOT block the whole panel from booting (matches the customer compose).
    depends_on:
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=4).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # Brief 4 R2 — Next.js admin / landing front. Caddy splits routes:
  # /v1/*, /auth/*, /setup*, /panel, /healthz, /mcp*, /static/* → backend
  # everything else (/, /admin/*, /pricing, /beta, /start, /showcase) → landing
  landing:
    build:
      context: ../core/landing
      dockerfile: Dockerfile
    env_file: .env
    environment:
      ABS_BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_SITE_URL: "${ABS_PUBLIC_URL:-https://abs.local}"
      NEXT_TELEMETRY_DISABLED: "1"
      # Q12 follow-up — Next.js standalone server.js binds to localhost
      # by default; override so the Docker bridge can reach it. Without
      # this Caddy → landing:3000 hits ECONNREFUSED.
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  email-cron:
    build: ../core/backend
    env_file: .env
    command: ["sh", "-c", "while true; do python infra/scripts/email_tick.py; sleep 300; done"]
    # The backend image bakes an HTTP HEALTHCHECK (curl /healthz), but this
    # service runs the email tick loop, not the HTTP server — so the inherited
    # probe can never pass and the container shows a false "unhealthy" (the
    # worker itself runs fine: "sent=0 failed=0" each tick). Override with the
    # same process probe customer.yml uses: walk /proc/[0-9]*/cmdline for the
    # email_tick process (POSIX sh + grep; debian:slim has no pgrep/procps).
    healthcheck:
      test:
        - "CMD-SHELL"
        - "for d in /proc/[0-9]*; do grep -q email_tick \"$$d/cmdline\" 2>/dev/null && exit 0; done; exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - abs-data:/app/data
      - abs-vault-key:/app/vault-key:ro
      - ../infra/scripts:/app/infra/scripts:ro
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      backend:
        condition: service_healthy
      landing:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  # ── ollama — real RAG embeddings (bge-m3, 1024-dim, multilingual) ──────────
  # Replaces the mock sha256 embedder so RAG does real semantic search.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - abs-ollama:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # one-shot: pull the embedding model so the first RAG request doesn't 404.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] pulling ${ABS_EMBEDDING_MODEL:-bge-m3} ..."
        ollama pull "${ABS_EMBEDDING_MODEL:-bge-m3}"
        echo "[ollama-init] embedding model ready"
    restart: "no"

  # ── whisperx — Meetings / transcription (real ASR) ────────────────────────
  whisperx:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_MODEL: "${ABS_WHISPERX_MODEL:-small}"
      ASR_ENGINE: "whisperx"
    expose:
      - "9000"
    volumes:
      - abs-whisper-cache:/root/.cache
    restart: unless-stopped

  # ── neo4j — Knowledge Graph backing /v1/graph/* ───────────────────────────
  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: "${ABS_NEO4J_USER:-neo4j}/${ABS_NEO4J_PASSWORD:-AbsNeo2026!}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    expose:
      - "7687"
    volumes:
      - abs-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_AUTH%/*} -p $${NEO4J_AUTH#*/} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  # ── cerbos — fine-grained authz (PDP) for /v1/rag/*, /v1/projects/* ────────
  # ./cerbos (= infra/cerbos in the cloned repo) ships config.yaml + policies.
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.40.0
    command: ["server", "--config=/etc/cerbos/config.yaml"]
    expose:
      - "3592"
      - "3593"
    volumes:
      - ./cerbos:/etc/cerbos:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ── qdrant — vector store for the /v1/rag/* API (newer RAG path) ───────────
  # No healthcheck — the image has no curl/wget/nc; backend uses qdrant_client
  # retry + /v1/rag/* graceful-503 wrappers instead.
  qdrant:
    image: qdrant/qdrant:v1.10.0
    expose:
      - "6333"
    volumes:
      - abs-qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  abs-data:
  abs-vault-key:           # 013 — master age key (asla secrets ile aynı volume'da olmaz)
  caddy-data:
  caddy-config:
  abs-ollama:
  abs-whisper-cache:
  abs-neo4j-data:
  abs-qdrant-data:
