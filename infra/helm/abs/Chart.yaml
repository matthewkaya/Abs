apiVersion: v2
name: abs
description: ABS umbrella chart (T-058) — backend + workers + NATS + Cerbos + Qdrant + Postgres + Redis + observability.
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    alias: postgres
    version: "13.4.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgres.enabled
  - name: redis
    version: "18.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nats
    version: "1.1.10"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
  - name: qdrant
    version: "0.8.0"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
  - name: cerbos
    version: "0.13.0"
    repository: "https://download.cerbos.dev/helm-charts"
    condition: cerbos.enabled
