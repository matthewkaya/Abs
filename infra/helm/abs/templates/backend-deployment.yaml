apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "abs.fullname" . }}-backend
  labels:
    {{- include "abs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "abs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "abs.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "abs.serviceAccountName" . }}
      {{- if .Values.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "abs.fullname" . }}-backend-config
            - secretRef:
                name: {{ include "abs.fullname" . }}-backend-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
