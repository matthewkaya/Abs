apiVersion: v1
kind: Secret
metadata:
  name: {{ include "abs.fullname" . }}-backend-secrets
  labels:
    {{- include "abs.labels" . | nindent 4 }}
type: Opaque
stringData:
  # All values are pulled from external K8s Secret resources by name; the
  # template just renders the reference. Real values are managed via sops/age.
  STRIPE_WEBHOOK_REF: "{{ .Values.stripe.webhookSecret }}"
  INNGEST_SIGNING_REF: "{{ .Values.inngest.signingKeyRef }}"
  INNGEST_EVENT_REF: "{{ .Values.inngest.eventKeyRef }}"
  ABS_STATE_POSTGRES_URL_REF: "{{ .Values.state.postgresUrl }}"
  NATS_TLS_REF: "{{ .Values.nats.tls.secretName }}"
