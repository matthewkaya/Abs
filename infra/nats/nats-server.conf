# T-001 — NATS JetStream config (single-node dev profile).
# Production cluster config lives in infra/helm/nats/values.yaml (T-058+).

server_name: "abs-nats-dev"
listen: "0.0.0.0:4222"
http: "0.0.0.0:8222"   # monitoring

max_payload: 4MB
max_pending: 64MB

jetstream {
    store_dir: "/data/jetstream"
    max_memory_store: 256MB
    max_file_store: 4GB
}

# Auth: dev profile uses no auth; prod overlay injects accounts + nkeys.
# accounts {
#   ABS: { users: [ { user: "abs", password: "$ABS_NATS_PASSWORD" } ] }
# }

# Limits
write_deadline: "10s"

# Logging
debug: false
trace: false
logtime: true
